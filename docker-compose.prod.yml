services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medflow-app
    restart: always
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - medflow
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: medflow-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medflow}
      POSTGRES_USER: ${POSTGRES_USER:-medflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - medflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medflow-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - medflow

  nginx:
    image: nginx:alpine
    container_name: medflow-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app
    networks:
      - medflow

  certbot:
    image: certbot/certbot
    container_name: medflow-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  backup:
    image: alpine:3.20
    container_name: medflow-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medflow}
      DB_HOST: medflow-db
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-sa-east-1}
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:-}
    volumes:
      - ./scripts/backup-s3.sh:/opt/medflow/scripts/backup-s3.sh:ro
      - backups:/tmp/medflow-backups
    networks:
      - medflow
    entrypoint: |
      /bin/sh -c '
        apk add --no-cache postgresql16-client aws-cli bash
        chmod +x /opt/medflow/scripts/backup-s3.sh
        echo "0 3 * * * /opt/medflow/scripts/backup-s3.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
      '

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-var:
  backups:

networks:
  medflow:
    driver: bridge
