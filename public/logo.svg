<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" fill="none">
  <!-- Icon: "C" with gradient background -->
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="36" height="36" x="0" y="2" rx="9" fill="url(#iconGrad)"/>
  <text x="18" y="23" text-anchor="middle" dominant-baseline="middle"
    font-family="system-ui, -apple-system, sans-serif" font-size="20"
    font-weight="700" fill="white">C</text>

  <!-- Wordmark: "Clinix" -->
  <text x="46" y="26" font-family="system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="600" fill="#e4e4e7" letter-spacing="-0.02em">Clinix</text>
</svg>
